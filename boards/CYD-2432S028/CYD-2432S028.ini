; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://platformio.org

##################################### CYD MODELS ####################################################
[CYD_base]
board = CYD-2432S028
monitor_speed = 115200
board_build.partitions = custom_4Mb_full.csv
build_src_filter = ${env.build_src_filter} +<../boards/CYD-2432S028>
build_flags =
    ; ==========================================
    ; НАСТРОЙКИ ЭКРАНА (ILI9341) И ОБЩЕЙ SPI ШИНЫ
    ; ==========================================
    -DTFT_MISO=-1
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=-1

    ; ==========================================
    ; НАСТРОЙКИ СЕНСОРА (XPT2046)
    ; ==========================================
    -DTOUCH_CS=21

    ; ==========================================
    ; НАСТРОЙКИ SD-КАРТЫ
    ; ==========================================
    -DSD_CS=-1


##################################### CYD MODELS ####################################################
[env:CYD-2432S028]
extends = CYD_base
build_flags =
	${CYD_base.build_flags}
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=16000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DDEVICE_NAME='"CYD-Custom"'
