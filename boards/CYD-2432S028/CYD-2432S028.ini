; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://platformio.org

##################################### CYD MODELS ################################# trick
[CYD_base]
board = CYD-2432S028
monitor_speed = 115200
board_build.partitions = custom_4Mb_full.csv
build_src_filter =${env.build_src_filter} +<../boards/CYD-2432S028>
build_flags =
    ; ==========================================
    ; НАСТРОЙКИ ЭКРАНА (ILI9341) И ОБЩЕЙ SPI ШИНЫ
    ; ==========================================
    -DTFT_MISO=-1      ; Оставлен пустым по вашей схеме
    -DTFT_MOSI=23      ; Пин D23 (SDI / MOSI)
    -DTFT_SCLK=18      ; Пин D18 (SCK / CLK)
    -DTFT_CS=5         ; Пин D5 (CS дисплея)
    -DTFT_DC=2         ; Пин D2 (DC / RS дисплея)
    -DTFT_RST=4        ; Пин D4 (RESET / RST дисплея)
    -DTFT_BL=-1        ; Подсветка напрямую от 3V3 (без управления от ESP32)

    ; ==========================================
    ; НАСТРОЙКИ СЕНСОРА (XPT2046)
    ; ==========================================
    -XPT2046_MOSI=23   ; Пин данных тачскрина (соединен с D23)
    -XPT2046_MISO=19   ; Пин D19 (T_DO тачскрина)
    -XPT2046_CLK=18    ; Пин тактовой частоты тачскрина (соединен с D18)
    -DTOUCH_CS=21      ; Пин D21 (T_CS тачскрина)

    ; ==========================================
    ; НАСТРОЙКИ SD-КАРТЫ (ЕСЛИ НЕ ИСПОЛЬЗУЕТСЯ)
    ; ==========================================
    -DSD_CS=-1         ; Отключаем SD-карту, чтобы не вызывала конфликтов


##################################### CYD MODELS ####################################################
[env:CYD-2432S028]
extends=CYD_base
build_flags =
	${CYD_base.build_flags}
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=16000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DDEVICE_NAME='"CYD-Custom"'
