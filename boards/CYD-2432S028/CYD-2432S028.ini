[CYD_base]
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = custom_4Mb_full.csv
build_src_filter = ${env.build_src_filter} +<../boards/CYD-2432S028>

[env:CYD-2432S028]
extends = CYD_base
build_flags =
	; --- Системные настройки частоты шины SPI ---
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=16000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DDEVICE_NAME='"Bruce-Custom"'

	; --- Драйвер экрана ---
	-DUSER_SETUP_LOADED=1
	-DILI9341_DRIVER=1

	; --- Конфигурация пинов дисплея ILI9341 ---
	-DTFT_MISO=19   ; Ваш пин MISO (Обычно это GPIO 19)
	-DTFT_MOSI=23   ; Ваш пин MOSI (Обычно это GPIO 23)
	-DTFT_SCLK=18   ; Ваш пин CLK/SCLK (Обычно это GPIO 18)
	-DTFT_CS=5      ; Ваш пин CS дисплея
	-DTFT_DC=2      ; Ваш пин DC / RS дисплея
	-DTFT_RST=4     ; Ваш пин RESET (Если соединен с EN платы, напишите -1)
	-DTFT_BL=21     ; Ваш пин подсветки экрана (LED / BL)

	; --- Конфигурация пинов тачскрина XPT2046 ---
	-DTOUCH_CS=22   ; ОТДЕЛЬНЫЙ пин CS для тачскрина (Не должен совпадать с TFT_CS!)

	; --- Настройки ориентации и калибровки экрана ---
	-DTFT_LOAD_GLCD=1
	-DTFT_LOAD_FONT2=1
	-DTFT_LOAD_FONT4=1
	-DTFT_LOAD_FONT6=1
	-DTFT_LOAD_FONT7=1
	-DTFT_LOAD_FONT8=1
	-DTFT_LOAD_GFXFF=1
